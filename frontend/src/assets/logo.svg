<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Modern Geometric Circle Loop -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#grad)" stroke-width="8" stroke-dasharray="180 50" />
  <!-- Data Node Points -->
  <circle cx="50" cy="10" r="6" fill="#3b82f6" />
  <circle cx="50" cy="90" r="6" fill="#8b5cf6" />
  <!-- Core Inner Data Block -->
  <rect x="38" y="38" width="24" height="24" rx="6" fill="url(#grad)" transform="rotate(45 50 50)" />
</svg>
